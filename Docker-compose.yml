services:
  db:
    image: postgres:16
    container_name: trailertrack-db
    environment:
      POSTGRES_DB: trailertrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - trailertrack-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trailertrack-web
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=trailertrack;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  trailertrack-data: